{% set version = "13.3.36" %}
{% set arm_variant_type = arm_variant_type | default("sbsa") %}
{% set cuda_version = "13.3" %}
{% set platform = "linux-x86_64" %}  # [linux64]
{% set platform = "linux-sbsa" %}  # [linux and aarch64]
{% set platform = "windows-x86_64" %}  # [win]
{% set extension = "tar.xz" %}  # [not win]
{% set extension = "zip" %}  # [win]

{% set soname = version.split(".")[0] %}

{% set sha256 = "1b055db199f806c746d53331200ccd8480bfdddd14638ed2911f30ee0cc4447b" %}  # [linux64]
{% set sha256 = "98d163bd49de3c06fc179e5534fe4d8d5e1ad65800bf8696f79d2aeccafa039e" %}  # [linux and aarch64]
{% set sha256 = "14cda835eca0121e8f82f60cb03e8584dc8cd584248f9e0827d5a11c0dae6fe8" %}  # [win]

package:
  name: cuda-tileiras-split
  version: {{ version }}

source:
  url: https://developer.download.nvidia.com/compute/cuda/redist/cuda_tileiras/{{ platform }}/cuda_tileiras-{{ platform }}-{{ version }}-archive.{{ extension }}
  sha256: {{ sha256 }}

build:
  number: 0
  skip: true  # [osx or ppc64le]

requirements:
  build:
    - cf-nvidia-tools 1  # [linux]

outputs:
  - name: cuda-tileiras
    build:
      binary_relocation: false
      script:                        # [win]
         - move bin\* %LIBRARY_BIN%  # [win]
    files:             # [linux]
      - bin/tileiras   # [linux]
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ stdlib('c') }}
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64]
      host:
        - cuda-version {{ cuda_version }}
      run:
        - {{ pin_compatible("cuda-version", max_pin="x.x") }}
        - cuda-nvcc-tools
        - cuda-nvvm-impl
    test:
      commands:
        - test -f $PREFIX/bin/tileiras                    # [linux]
        - if not exist %LIBRARY_BIN%\tileiras.exe exit 1  # [win]
        - tileiras --version

about:
  home: https://developer.nvidia.com/cuda-toolkit
  license_file: LICENSE
  license: LicenseRef-NVIDIA-End-User-License-Agreement
  license_url: https://docs.nvidia.com/cuda/eula/index.html
  summary: TileIR is a portable and language agnostic intermediate representation for CUDA kernels
  description: With Tile IR, we introduce a new operation set and programming model to retain CUDA’s performance across architectures while regaining portability and improving productivity for developers using matrix operations on new architectures. We virtualize tensor-cores and their associated programming model to the
    point that we can innovate new approaches in hardware without invalidating investments in software.
  doc_url: https://docs.nvidia.com/cuda/index.html

extra:
  feedstock-name: cuda-tileiras
  recipe-maintainers:
    - conda-forge/cuda
